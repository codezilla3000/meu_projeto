{% extends "base.html" %}

{% block title %}
Tipos de Produto
{% endblock %}

{% block content %}

<h2 class="mb-4">Tipos de Produto</h2>

<a href="{% url 'tipo_criar' %}" class="btn btn-success mb-3">
    Novo Tipo
</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Nome</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody>
        {% for tipo in tipos %}
        <tr>
            <td>{{ tipo.nome }}</td>
            <td>
                <a href="{% url 'tipo_editar' tipo.id %}" class="btn btn-warning btn-sm">
                    Editar
                </a>
                <a href="{% url 'tipo_deletar' tipo.id %}" class="btn btn-danger btn-sm">
                    Excluir
                </a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" class="text-center">
                Nenhum tipo cadastrado
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
