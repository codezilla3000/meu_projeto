{% extends "base.html" %}

{% block title %}
Adicionar Produto
{% endblock %}

{% block content %}

<h2>Adicionar Produto ao Pedido</h2>

<<form method="post">
{% csrf_token %}

{{ form.errors }}

<div class="mb-3">
{{ form.produto.label_tag }}
{{ form.produto }}
</div>

<div class="mb-3">
{{ form.quantidade.label_tag }}
{{ form.quantidade }}
</div>

<button type="submit" class="btn btn-success">
Adicionar
</button>

</form>

{% endblock %}
