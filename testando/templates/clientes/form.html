{% extends "base.html" %}

{% block title %}
Cliente
{% endblock %}

{% block content %}

<h2 class="mb-4">Cadastro de Cliente</h2>

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Nome</label>
{{ form.nome }}
</div>

<div class="mb-3">
<label class="form-label">Endereço</label>
{{ form.endereco }}
</div>

<div class="mb-3">
<label class="form-label">Idade</label>
{{ form.idade }}
</div>

<div class="mb-3">
<label class="form-label">Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>
{{ form.telefone }}
</div>

<button type="submit" class="btn btn-success">
Salvar
</button>

<a href="{% url 'clientes_lista' %}" class="btn btn-secondary">
Cancelar
</a>

</form>

{% endblock %}
