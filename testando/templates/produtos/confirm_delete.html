{% extends "base.html" %}

{% block title %}
Excluir Produto
{% endblock %}

{% block content %}

<h2>Excluir Produto</h2>

<p>Tem certeza que deseja excluir o produto <strong>{{ object.nome }}</strong>?</p>

<form method="post">
    {% csrf_token %}


<button type="submit" class="btn btn-danger">
    Confirmar exclusão
</button>

<a href="{% url 'produtos_lista' %}" class="btn btn-secondary">
    Cancelar
</a>

</form>

{% endblock %}
